<div class="custom-data-form">
  <h2>Dodaj nowy obiekt</h2>
  <form (ngSubmit)="submit()">
    <div class="form-row">
      <label for="id">ID</label>
      <input id="id" name="id" [(ngModel)]="model.id" required />
    </div>

    <div class="form-row">
      <label for="amount">Kwota</label>
      <input id="amount" name="amount" type="number" [(ngModel)]="model.amount" />
    </div>

    <div class="form-row">
      <label for="date">Data</label>
      <input id="date" name="date" type="date" [(ngModel)]="model.date" />
    </div>

    <div class="form-row">
      <label for="description">Opis</label>
      <input id="description" name="description" [(ngModel)]="model.description" />
    </div>

    <button type="submit">Dodaj</button>
  </form>
</div>
